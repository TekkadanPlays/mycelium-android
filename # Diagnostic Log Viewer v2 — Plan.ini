## Execution Order

| Step | What | Files | Scope |
|------|------|-------|-------|
| 1 | Add `ChannelGroup` enum + `Channel.group` | `DiagnosticLog.kt` | Small |
| 2 | Rewrite chip navigation as two-tier | `DiagnosticLogViewerScreen.kt` | Medium |
| 3 | Add `traceId` param to `DiagnosticLog.log()` + `MLog.*()` | `DiagnosticLog.kt`, `MLog.kt` | Small |
| 4 | Update log format to include `[traceId]` prefix | `DiagnosticLog.kt` | Small |
| 5 | Add "Group by trace" toggle + collapsible UI | `DiagnosticLogViewerScreen.kt` | Medium |
| 6 | Instrument top call sites with trace IDs | Various repositories | Incremental |

> [!NOTE]
> Steps 1-2 and 3-5 are independent tracks. We can ship the two-tier navigation first for immediate UX relief, then add trace correlation separately.

