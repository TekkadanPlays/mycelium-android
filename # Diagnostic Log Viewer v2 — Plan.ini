# Diagnostic Log Viewer v2 — Plan

## Problem Statement

1. **10 channel chips are cumbersome** — the horizontal scroll bar fills up, and the user has to remember which channel holds what. Channels like FEED catch ~20+ distinct source tags (NotesRepo, DashboardVM, Topic, Thread, DM, Emoji, etc.), making the single-channel view a firehose.

2. **No process isolation** — all log lines within a channel are a flat stream. You can't isolate e.g. "what happened during this specific relay reconnect" or "the full lifecycle of this subscription" without manually grep-searching through hundreds of unrelated entries.

---

## Part 1: Two-Tier Navigation (Replaces Flat Chip Bar)

### Current architecture
```
[All] [Startup] [Relay] [Feed] [Sync] [State] [Auth] [Notif] [Wallet] [General]
                        ↓
              flat list of all FEED lines
```

### Proposed architecture
```
Tier 1: Channel Groups (collapsed into ~4 top-level categories)
┌─────────────────────────────────────────────────────┐
│ [All]  [Network]  [Data]  [System]  [Payments]      │
└─────────────────────────────────────────────────────┘

Tier 2: Source tags within the selected group (auto-discovered)
┌─────────────────────────────────────────────────────┐
│ NotesRepo (142)  DashboardVM (38)  Topic (22)  ...  │
└─────────────────────────────────────────────────────┘
```

### Channel → Group mapping

| Group | Channels | Rationale |
|-------|----------|-----------|
| **Network** | RELAY, SYNC, AUTH | Connection lifecycle, relay management, NIP-42 |
| **Data** | FEED, NOTIFICATION, STATE | Content ingestion, notifications, storage |
| **System** | STARTUP, GENERAL | App lifecycle, uncategorized |
| **Payments** | WALLET | Zaps, NWC, lightning |

### Implementation

#### A. DiagnosticLog changes (backend)
- Add `enum class ChannelGroup` with the 4 groups above
- Add `Channel.group: ChannelGroup` property
- No changes to file I/O — groups are a UI-only concept, composed from existing channel files

#### B. DiagnosticLogViewerScreen changes (UI)
- **Tier 1 row**: 5 chips (`All` + 4 groups), always visible, no scrolling needed
- **Tier 2 row**: Dynamically populated from the `source` field of parsed log entries in the selected group. Each chip shows the source name + count badge. Appears only when a specific group is selected (not "All").
- Selecting a Tier 2 source filters entries to only that source tag
- "All" in Tier 1 collapses Tier 2 and shows the full unified stream

#### C. Chip count badges
Each Tier 1 group chip and Tier 2 source chip displays a small count of matching entries, giving at-a-glance visibility into which areas are noisy.

---

## Part 2: Process Correlation (Trace IDs)

### Problem
Inside RELAY channel, you might see 50 interleaved log lines from 8 different relay connections. There's no way to follow one relay's reconnect lifecycle without reading every line.

### Solution: Optional `traceId` parameter

Add a lightweight `traceId` string to `DiagnosticLog.log()` and `MLog.*()`. This is a free-form tag that groups related log entries across time.

```kotlin
// Example: trace a single relay connection lifecycle
val traceId = "relay:${url.hashCode().toString(16)}"
MLog.d("CybinRelay", "connecting to $url", channel = RELAY, trace = traceId)
MLog.d("CybinRelay", "handshake OK", channel = RELAY, trace = traceId)
MLog.d("CybinRelay", "EOSE received", channel = RELAY, trace = traceId)
```

### Log format change
```
Before: HH:mm:ss.SSS | D | RELAY        | CybinRelay           | connecting to wss://relay.damus.io
After:  HH:mm:ss.SSS | D | RELAY        | CybinRelay           | [relay:a3f2] connecting to wss://relay.damus.io
```

The `[traceId]` prefix is only appended when a trace is provided.

### UI: Trace Grouping View

In the log viewer, add a **"Group by trace"** toggle in the toolbar:
- **Off (default)**: Flat chronological stream (current behavior)
- **On**: Entries are grouped under collapsible headers by `traceId`. Each header shows: trace ID, first/last timestamp, entry count. Entries without a traceId appear under "Ungrouped".

This lets you expand just "relay:a3f2" and see the complete lifecycle of that one connection, ignoring all other noise.

### Incremental rollout
Trace IDs are optional — we add the parameter now and instrument the highest-value call sites first:
1. **Relay connections** — trace per relay URL
2. **Subscription lifecycle** — trace per subscription ID
3. **Notification ingestion** — trace per event ID being processed
4. **Startup phases** — trace per orchestrator phase

